<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gospy - Request Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 8px 16px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 {
            font-size: 16px;
            color: #e94560;
        }
        header .stats {
            font-size: 11px;
            color: #888;
        }
        .filter-input {
            background: #0d1117;
            border: 1px solid #0f3460;
            color: #e0e0e0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            width: 200px;
        }
        .filter-input::placeholder { color: #555; }
        .filter-input:focus { outline: none; border-color: #e94560; }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .request-list {
            width: 350px;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            background: #16213e;
        }
        .request-item {
            padding: 8px 10px;
            border-bottom: 1px solid #1a1a2e;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 11px;
            line-height: 1.4;
        }
        .request-item:hover { background: #1a1a2e; }
        .request-item.selected {
            background: #0f3460;
            border-left: 3px solid #e94560;
            padding-left: 7px;
        }
        .request-item .method {
            font-weight: bold;
            flex-shrink: 0;
        }
        .method-GET { color: #4caf50; }
        .method-POST { color: #ff9800; }
        .method-PUT { color: #2196f3; }
        .method-DELETE { color: #f44336; }
        .method-PATCH { color: #9c27b0; }
        .method-CONNECT { color: #00bcd4; }
        .request-item .url {
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            word-break: break-all;
            overflow-wrap: anywhere;
        }
        .request-item .status {
            flex-shrink: 0;
            font-size: 10px;
        }
        .status-2xx { color: #4caf50; }
        .status-3xx { color: #ff9800; }
        .status-4xx { color: #f44336; }
        .status-5xx { color: #e94560; }
        .request-item .time {
            font-size: 10px;
            color: #555;
            flex-shrink: 0;
        }
        .detail-panel {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .detail-panel .empty {
            color: #666;
            text-align: center;
            margin-top: 100px;
        }
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 6px 14px;
            background: #16213e;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px 4px 0 0;
        }
        .tab.active {
            background: #0f3460;
            color: #e0e0e0;
        }
        .tab-content {
            background: #16213e;
            border-radius: 0 4px 4px 4px;
            padding: 15px;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .section-title {
            font-size: 11px;
            color: #e94560;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: bold;
        }
        pre {
            background: #0d1117;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 11px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .header-row {
            display: flex;
            gap: 8px;
            margin-bottom: 2px;
            word-break: break-word;
        }
        .header-key {
            color: #79c0ff;
            flex-shrink: 0;
        }
        .header-value {
            color: #a5d6ff;
            word-break: break-word;
        }
        .btn {
            background: #0f3460;
            border: none;
            color: #e0e0e0;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .btn:hover { background: #1a4a7a; }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #888;
        }
        .badge {
            background: #e94560;
            color: #fff;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 8px;
            margin-left: 4px;
        }
        .ignored-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: #0d1117;
            border-left: 1px solid #0f3460;
            z-index: 10;
            display: none;
            flex-direction: column;
        }
        .ignored-panel.open { display: flex; }
        .ignored-panel-header {
            padding: 12px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ignored-panel-header h3 {
            font-size: 13px;
            color: #e94560;
        }
        .ignored-panel-close {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 16px;
        }
        .ignored-panel-close:hover { color: #e0e0e0; }
        .ignored-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .ignored-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 11px;
        }
        .ignored-item .host { color: #aaa; }
        .ignored-item .remove-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }
        .ignored-item .remove-btn:hover { color: #e94560; }
        .detail-toolbar {
            margin-bottom: 12px;
        }
        .btn-ignore-detail {
            background: transparent;
            border: 1px solid #555;
            color: #888;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-ignore-detail:hover {
            border-color: #e94560;
            color: #e94560;
        }
        .btn-active {
            background: #0f3460;
            border: 1px solid #4caf50;
            color: #4caf50;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-active:hover { background: #1a4a7a; }
    </style>
</head>
<body>
    <header>
        <h1>GOSPY</h1>
        <span class="stats" id="stats">0 requests</span>
        <input type="text" class="filter-input" id="filterInput" placeholder="Filter (method, url, status)...">
        <div style="flex:1"></div>
        <button class="btn" onclick="toggleIgnoredPanel()">Ignored <span class="badge" id="ignoredCount">0</span></button>
        <div class="auto-refresh">
            <input type="checkbox" id="autoRefresh" checked>
            <label for="autoRefresh">Auto</label>
        </div>
        <button class="btn" onclick="loadRequests()">Refresh</button>
    </header>
    <div class="container">
        <div class="request-list" id="requestList">
            <div style="padding:20px;color:#666;text-align:center">
                Waiting for requests...
            </div>
        </div>
        <div class="detail-panel" id="detailPanel">
            <div class="empty">Select a request to view details</div>
        </div>
        <div class="ignored-panel" id="ignoredPanel">
            <div class="ignored-panel-header">
                <h3>Ignored Hosts</h3>
                <button class="ignored-panel-close" onclick="toggleIgnoredPanel()">&times;</button>
            </div>
            <div class="ignored-list" id="ignoredList"></div>
        </div>
    </div>

    <script>
        let requests = [];
        let selectedId = null;
        let filterText = '';
        let ignoredHosts = [];

        async function loadRequests() {
            try {
                const resp = await fetch('/api/requests');
                requests = await resp.json();
                renderList();
            } catch (e) {
                console.error('Failed to load requests:', e);
            }
        }

        async function loadIgnored() {
            try {
                const resp = await fetch('/api/ignored');
                ignoredHosts = await resp.json();
                document.getElementById('ignoredCount').textContent = ignoredHosts.length;
                renderIgnoredList();
            } catch (e) {
                console.error('Failed to load ignored:', e);
            }
        }

        async function confirmIgnoreHost(host) {
            if (!host) return;
            if (!confirm('Ignore all requests from ' + host + '?')) return;
            try {
                const resp = await fetch('/api/ignored', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ host })
                });
                if (!resp.ok) throw new Error('Server returned ' + resp.status);
                ignoredHosts.push(host);
                document.getElementById('ignoredCount').textContent = ignoredHosts.length;
                renderIgnoredList();
                const btn = document.querySelector('.btn-ignore-detail');
                if (btn) {
                    btn.outerHTML = `<button class="btn-active" onclick="confirmUnignoreHost('${escapeHtml(host)}')"><svg width="12" height="12" viewBox="0 0 16 16"><polyline points="3,8 7,12 13,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Remove ignore</button>`;
                }
                renderList();
            } catch (e) {
                console.error('Failed to ignore host:', e);
            }
        }

        async function confirmUnignoreHost(host) {
            try {
                await fetch('/api/ignored/' + encodeURIComponent(host), { method: 'DELETE' });
                ignoredHosts = ignoredHosts.filter(h => h !== host);
                document.getElementById('ignoredCount').textContent = ignoredHosts.length;
                renderIgnoredList();
                const btn = document.querySelector('.btn-active');
                if (btn) {
                    btn.outerHTML = `<button class="btn-ignore-detail" onclick="confirmIgnoreHost('${escapeHtml(host)}')"><svg width="12" height="12" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="5" y1="5" x2="11" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Ignore host</button>`;
                }
                renderList();
            } catch (e) {
                console.error('Failed to unignore host:', e);
            }
        }

        function renderIgnoredList() {
            const list = document.getElementById('ignoredList');
            if (ignoredHosts.length === 0) {
                list.innerHTML = '<div style="padding:20px;color:#666;text-align:center">No ignored hosts</div>';
                return;
            }
            list.innerHTML = ignoredHosts.map(h => `
                <div class="ignored-item">
                    <span class="host">${escapeHtml(h)}</span>
                    <button class="remove-btn" onclick="confirmUnignoreHost('${escapeHtml(h)}')" title="Remove">&times;</button>
                </div>
            `).join('');
        }

        function toggleIgnoredPanel() {
            document.getElementById('ignoredPanel').classList.toggle('open');
        }

        function getFilteredRequests() {
            if (!filterText) return requests;
            const q = filterText.toLowerCase();
            return requests.filter(r => {
                const method = (r.request.method || '').toLowerCase();
                const url = (r.request.url || r.request.host || '').toLowerCase();
                const status = r.response ? String(r.response.status) : '';
                return method.includes(q) || url.includes(q) || status.includes(q);
            });
        }

        function renderList() {
            const list = document.getElementById('requestList');
            const filtered = getFilteredRequests();
            const total = requests.length;

            if (filterText) {
                document.getElementById('stats').textContent = filtered.length + ' / ' + total + ' requests';
            } else {
                document.getElementById('stats').textContent = total + ' requests';
            }

            if (requests.length === 0) {
                list.innerHTML = '<div style="padding:20px;color:#666;text-align:center">Waiting for requests...</div>';
                return;
            }

            const scrollTop = list.scrollTop;

            list.innerHTML = filtered.map(r => {
                const method = r.request.method;
                const url = r.request.url || r.request.host;
                const status = r.response ? r.response.status : null;
                const time = new Date(r.timestamp).toLocaleTimeString();
                const selected = r.id === selectedId ? ' selected' : '';
                const statusClass = status ? (status < 300 ? 'status-2xx' : status < 400 ? 'status-3xx' : status < 500 ? 'status-4xx' : 'status-5xx') : '';

                return `
                    <div class="request-item${selected}" title="${escapeHtml(url)}" onclick="selectRequest('${r.id}')">
                        <span class="method method-${method}">${method}</span>
                        <span class="url">${escapeHtml(url)}</span>
                        ${status ? `<span class="status ${statusClass}">${status}</span>` : ''}
                        <span class="time">${time}</span>
                    </div>
                `;
            }).join('');

            if (selectedId) {
                list.scrollTop = scrollTop;
            } else {
                list.scrollTop = 0;
            }
        }

        function selectRequest(id) {
            selectedId = id;
            renderList();
            const req = requests.find(r => r.id === id);
            if (req) renderDetail(req);
        }

        function renderDetail(req) {
            const panel = document.getElementById('detailPanel');
            const host = req.request.host || '';
            const isIgnored = ignoredHosts.includes(host);

            const reqHeaders = req.request.headers ? Object.entries(req.request.headers).map(([k,v]) =>
                `<div class="header-row"><span class="header-key">${escapeHtml(k)}:</span><span class="header-value">${escapeHtml(Array.isArray(v) ? v.join(', ') : v)}</span></div>`
            ).join('') : '<div style="color:#666">No headers</div>';

            const respHeaders = req.response && req.response.headers ? Object.entries(req.response.headers).map(([k,v]) =>
                `<div class="header-row"><span class="header-key">${escapeHtml(k)}:</span><span class="header-value">${escapeHtml(Array.isArray(v) ? v.join(', ') : v)}</span></div>`
            ).join('') : '<div style="color:#666">No response yet</div>';

            const reqBody = req.request.body || '';
            const respBody = req.response ? (req.response.body || '') : '';

            const ignoreBtn = isIgnored
                ? `<button class="btn-active" onclick="confirmUnignoreHost('${escapeHtml(host)}')"><svg width="12" height="12" viewBox="0 0 16 16"><polyline points="3,8 7,12 13,4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Remove ignore</button>`
                : `<button class="btn-ignore-detail" onclick="confirmIgnoreHost('${escapeHtml(host)}')"><svg width="12" height="12" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2"/><line x1="5" y1="5" x2="11" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Ignore host</button>`;

            panel.innerHTML = `
                <div class="detail-toolbar">
                    ${ignoreBtn}
                </div>
                <div class="tabs">
                    <button class="tab active" onclick="showTab(this, 'request')">Request</button>
                    <button class="tab" onclick="showTab(this, 'response')">Response</button>
                </div>

                <div id="tab-request" class="tab-content">
                    <div class="section-title">Request</div>
                    <pre>${escapeHtml(req.request.method)} ${escapeHtml(req.request.url || req.request.host)}</pre>

                    <div class="section-title" style="margin-top:12px">Headers</div>
                    <pre>${reqHeaders}</pre>

                    ${reqBody ? `<div class="section-title" style="margin-top:12px">Body</div><pre>${escapeHtml(reqBody)}</pre>` : ''}
                </div>

                <div id="tab-response" class="tab-content" style="display:none">
                    <div class="section-title">Response</div>
                    <pre>Status: ${req.response ? req.response.status : 'Pending'}</pre>

                    <div class="section-title" style="margin-top:12px">Headers</div>
                    <pre>${respHeaders}</pre>

                    ${respBody ? `<div class="section-title" style="margin-top:12px">Body</div><pre>${escapeHtml(respBody)}</pre>` : ''}
                </div>
            `;
        }

        function showTab(btn, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            btn.classList.add('active');
            document.getElementById('tab-' + tab).style.display = 'block';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.getElementById('filterInput').addEventListener('input', function(e) {
            filterText = e.target.value.trim();
            renderList();
        });

        loadRequests();
        loadIgnored();
        setInterval(() => {
            if (document.getElementById('autoRefresh').checked) loadRequests();
        }, 2000);
    </script>
</body>
</html>

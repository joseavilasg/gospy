<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gospy - Request Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="json-viewer.css">
</head>
<body>
    <header>
        <h1>GOSPY</h1>
        <span class="stats" id="stats">0 requests</span>
        <input type="text" class="filter-input" id="filterInput" placeholder="Filter (method, url, status)...">
        <div style="flex:1"></div>
        <button class="btn" id="focusBtn">Focus <span class="badge" id="focusedCount">0</span></button>
        <div class="auto-refresh">
            <input type="checkbox" id="focusEnabled" title="Enable focus filter">
        </div>
        <div class="header-sep"></div>
        <button class="btn" id="refreshBtn">Refresh</button>
        <div class="auto-refresh">
            <input type="checkbox" id="autoRefresh" checked title="Auto-refresh requests">
        </div>
        <div class="header-sep"></div>
        <button class="btn" id="ignoredBtn">Ignored <span class="badge" id="ignoredCount">0</span></button>
    </header>
    <div class="container" id="container">
        <div class="request-list" id="requestList">
            <div style="padding:20px;color:#666;text-align:center">
                Waiting for requests...
            </div>
        </div>
        <button class="list-toggle" id="toggleListBtn" title="Toggle request list"><svg width="12" height="12" viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div class="detail-panel" id="detailPanel">
            <div class="empty">Select a request to view details</div>
        </div>
        <div class="ignored-panel" id="ignoredPanel">
            <div class="ignored-panel-header">
                <h3>Ignored Hosts</h3>
                <button class="ignored-panel-close">&times;</button>
            </div>
            <div class="ignored-list" id="ignoredList"></div>
            <div class="focus-add">
                <input type="text" id="ignoreInput" placeholder="Add host or wildcard...">
                <button id="ignoreAddBtn">+</button>
            </div>
        </div>
        <div class="ignored-panel" id="focusedPanel">
            <div class="ignored-panel-header">
                <h3>Focused Hosts</h3>
                <button class="ignored-panel-close">&times;</button>
            </div>
            <div class="ignored-list" id="focusedList"></div>
            <div class="focus-add">
                <input type="text" id="focusInput" placeholder="Add host or wildcard...">
                <button id="focusAddBtn">+</button>
            </div>
        </div>
    </div>

    <script src="json-viewer.js"></script>
    <script src="monaco/vs/loader.js"></script>
    <script src="monaco-init.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>

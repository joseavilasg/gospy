<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gospy - Request Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 {
            font-size: 18px;
            color: #e94560;
        }
        header .stats {
            font-size: 12px;
            color: #888;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .request-list {
            width: 350px;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
            background: #16213e;
        }
        .request-item {
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a2e;
            cursor: pointer;
            transition: background 0.15s;
        }
        .request-item:hover {
            background: #1a1a2e;
        }
        .request-item.selected {
            background: #0f3460;
            border-left: 3px solid #e94560;
        }
        .request-item .method {
            font-weight: bold;
            font-size: 12px;
            margin-right: 8px;
        }
        .method-GET { color: #4caf50; }
        .method-POST { color: #ff9800; }
        .method-PUT { color: #2196f3; }
        .method-DELETE { color: #f44336; }
        .method-PATCH { color: #9c27b0; }
        .method-CONNECT { color: #00bcd4; }
        .request-item .url {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .request-item .status {
            font-size: 11px;
            margin-top: 4px;
        }
        .status-2xx { color: #4caf50; }
        .status-3xx { color: #ff9800; }
        .status-4xx { color: #f44336; }
        .status-5xx { color: #e94560; }
        .request-item .time {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }
        .detail-panel {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .detail-panel .empty {
            color: #666;
            text-align: center;
            margin-top: 100px;
        }
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 8px 16px;
            background: #16213e;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px 4px 0 0;
        }
        .tab.active {
            background: #0f3460;
            color: #e0e0e0;
        }
        .tab-content {
            background: #16213e;
            border-radius: 0 4px 4px 4px;
            padding: 15px;
        }
        .section-title {
            font-size: 12px;
            color: #e94560;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
        }
        pre {
            background: #0d1117;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .header-row {
            display: flex;
            gap: 10px;
            margin-bottom: 4px;
        }
        .header-key {
            color: #79c0ff;
            min-width: 200px;
        }
        .header-value {
            color: #a5d6ff;
        }
        .refresh-btn {
            background: #0f3460;
            border: none;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn:hover {
            background: #1a4a7a;
        }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <h1>GOSPY</h1>
        <span class="stats" id="stats">0 requests</span>
        <div style="flex:1"></div>
        <div class="auto-refresh">
            <input type="checkbox" id="autoRefresh" checked>
            <label for="autoRefresh">Auto-refresh</label>
        </div>
        <button class="refresh-btn" onclick="loadRequests()">Refresh</button>
    </header>
    <div class="container">
        <div class="request-list" id="requestList">
            <div class="empty" style="padding:20px;color:#666;text-align:center">
                Waiting for requests...
            </div>
        </div>
        <div class="detail-panel" id="detailPanel">
            <div class="empty">Select a request to view details</div>
        </div>
    </div>

    <script>
        let requests = [];
        let selectedId = null;

        async function loadRequests() {
            try {
                const resp = await fetch('/api/requests');
                requests = await resp.json();
                renderList();
            } catch (e) {
                console.error('Failed to load requests:', e);
            }
        }

        function renderList() {
            const list = document.getElementById('requestList');
            document.getElementById('stats').textContent = requests.length + ' requests';

            if (requests.length === 0) {
                list.innerHTML = '<div class="empty" style="padding:20px;color:#666;text-align:center">Waiting for requests...</div>';
                return;
            }

            list.innerHTML = requests.map(r => {
                const method = r.request.method;
                const url = r.request.url || r.request.host;
                const status = r.response ? r.response.status : null;
                const time = new Date(r.timestamp).toLocaleTimeString();
                const selected = r.id === selectedId ? ' selected' : '';
                const statusClass = status ? (status < 300 ? 'status-2xx' : status < 400 ? 'status-3xx' : status < 500 ? 'status-4xx' : 'status-5xx') : '';

                return `
                    <div class="request-item${selected}" onclick="selectRequest('${r.id}')">
                        <div>
                            <span class="method method-${method}">${method}</span>
                            <span class="url">${escapeHtml(url)}</span>
                        </div>
                        ${status ? `<div class="status ${statusClass}">Status: ${status}</div>` : ''}
                        <div class="time">${time}</div>
                    </div>
                `;
            }).join('');
        }

        function selectRequest(id) {
            selectedId = id;
            renderList();
            const req = requests.find(r => r.id === id);
            if (req) renderDetail(req);
        }

        function renderDetail(req) {
            const panel = document.getElementById('detailPanel');
            const reqHeaders = req.request.headers ? Object.entries(req.request.headers).map(([k,v]) =>
                `<div class="header-row"><span class="header-key">${escapeHtml(k)}:</span><span class="header-value">${escapeHtml(Array.isArray(v) ? v.join(', ') : v)}</span></div>`
            ).join('') : '<div style="color:#666">No headers</div>';

            const respHeaders = req.response && req.response.headers ? Object.entries(req.response.headers).map(([k,v]) =>
                `<div class="header-row"><span class="header-key">${escapeHtml(k)}:</span><span class="header-value">${escapeHtml(Array.isArray(v) ? v.join(', ') : v)}</span></div>`
            ).join('') : '<div style="color:#666">No response yet</div>';

            const reqBody = req.request.body || '';
            const respBody = req.response ? (req.response.body || '') : '';

            panel.innerHTML = `
                <div class="tabs">
                    <button class="tab active" onclick="showTab(this, 'request')">Request</button>
                    <button class="tab" onclick="showTab(this, 'response')">Response</button>
                </div>

                <div id="tab-request" class="tab-content">
                    <div class="section-title">Request</div>
                    <pre>${escapeHtml(req.request.method)} ${escapeHtml(req.request.url || req.request.host)}</pre>

                    <div class="section-title" style="margin-top:15px">Headers</div>
                    <pre>${reqHeaders}</pre>

                    ${reqBody ? `<div class="section-title" style="margin-top:15px">Body</div><pre>${escapeHtml(reqBody)}</pre>` : ''}
                </div>

                <div id="tab-response" class="tab-content" style="display:none">
                    <div class="section-title">Response</div>
                    <pre>Status: ${req.response ? req.response.status : 'Pending'}</pre>

                    <div class="section-title" style="margin-top:15px">Headers</div>
                    <pre>${respHeaders}</pre>

                    ${respBody ? `<div class="section-title" style="margin-top:15px">Body</div><pre>${escapeHtml(respBody)}</pre>` : ''}
                </div>
            `;
        }

        function showTab(btn, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            btn.classList.add('active');
            document.getElementById('tab-' + tab).style.display = 'block';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        loadRequests();
        setInterval(() => {
            if (document.getElementById('autoRefresh').checked) loadRequests();
        }, 2000);
    </script>
</body>
</html>
